services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: lumiere-sqlserver
    environment:
      SA_PASSWORD: "Lumiere@Str0ng!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "Lumiere@Str0ng!", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lumiere-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: "Server=sqlserver,1433;Database=Lumiere;User Id=sa;Password=Lumiere@Str0ng!;TrustServerCertificate=True"
    depends_on:
      sqlserver:
        condition: service_healthy

volumes:
  sqlserver_data:
